<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login - Maharaja Travels Agency</title>
  <link rel="icon" href="../assets/images/logo.jpeg" type="image/jpeg">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/auth.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="dark-mode auth-body">

  <div class="auth-bg-shapes">
    <div class="auth-shape shape-primary"></div>
    <div class="auth-shape shape-accent"></div>
  </div>

  <a href="../index.html" class="back-home"><i class="fa-solid fa-arrow-left me-2"></i>Back to Home</a>

  <div class="auth-container">
    <div class="auth-card">
      <img src="../assets/images/logo.jpeg" alt="Maharaja Travels Logo" class="auth-logo">
      <h2>Welcome Back</h2>
      <p class="auth-subtitle">Please enter your credentials to login</p>
      
      <form id="loginPageForm">
        <div class="form-floating-custom">
          <input type="email" id="loginEmail" placeholder=" " required>
          <i class="fa-solid fa-envelope input-icon"></i>
          <label>Email Address</label>
        </div>

        <div class="form-floating-custom">
          <input type="password" id="loginPassword" placeholder=" " required>
          <i class="fa-solid fa-lock input-icon"></i>
          <label>Password</label>
        </div>
        
        <div class="d-flex justify-content-between align-items-center mb-4 text-start">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="rememberMe">
            <label class="form-check-label text-muted" for="rememberMe" style="font-size: 0.9rem;">
              Remember me
            </label>
          </div>
          <a href="#" class="text-primary text-decoration-none fw-bold" style="font-size: 0.9rem;">Forgot Password?</a>
        </div>

        <button type="submit" class="btn-auth-primary">
          Sign In <i class="fa-solid fa-arrow-right-to-bracket"></i>
        </button>
        
        <div class="auth-footer">
          <p>Don't have an account? <a href="register.html">Sign Up Now</a></p>
        </div>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../assets/js/db.js"></script>
  <script src="../assets/js/main.js"></script>
</body>
</html>
