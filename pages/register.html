<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Register - Maharaja Travels Agency</title>
  <link rel="icon" href="../assets/images/logo.jpeg" type="image/jpeg">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/auth.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="dark-mode auth-body">

  <div class="auth-bg-shapes">
    <div class="auth-shape shape-primary"></div>
    <div class="auth-shape shape-accent"></div>
  </div>

  <a href="../index.html" class="back-home"><i class="fa-solid fa-arrow-left me-2"></i>Back to Home</a>

  <div class="auth-container">
    <div class="auth-card">
      <img src="../assets/images/logo.jpeg" alt="Maharaja Travels Logo" class="auth-logo">
      <h2>Create Account</h2>
      <p class="auth-subtitle">Join Maharaja Travels for exclusive travel offers</p>
      
      <form id="registerPageForm">
        <div class="form-floating-custom">
          <input type="text" id="registerName" placeholder=" " required>
          <i class="fa-solid fa-user input-icon"></i>
          <label>Full Name</label>
        </div>

        <div class="form-floating-custom">
          <input type="email" id="registerEmail" placeholder=" " required>
          <i class="fa-solid fa-envelope input-icon"></i>
          <label>Email Address</label>
        </div>

        <div class="form-floating-custom">
          <input type="password" id="registerPassword" placeholder=" " required>
          <i class="fa-solid fa-lock input-icon"></i>
          <label>Password</label>
        </div>

        <div class="form-floating-custom">
          <input type="password" id="registerConfirmPassword" placeholder=" " required>
          <i class="fa-solid fa-shield-halved input-icon"></i>
          <label>Confirm Password</label>
        </div>
        
        <button type="submit" class="btn-auth-primary">
          Sign Up <i class="fa-solid fa-user-plus"></i>
        </button>
        
        <div class="auth-footer">
          <p>Already have an account? <a href="login.html">Sign In</a></p>
        </div>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../assets/js/db.js"></script>
  <script src="../assets/js/main.js"></script>
</body>
</html>
